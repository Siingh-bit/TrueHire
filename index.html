<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Switchera — Verified Job Portal | Find Jobs &amp; Hire Verified Talent</title>
    <meta name="title" content="Switchera — Verified Job Portal | Find Jobs &amp; Hire Verified Talent" />
    <meta name="description" content="Switchera is a verified job portal connecting job seekers with trusted employers. Find verified jobs, prove your skills with proctored assessments, and let companies hire pre-screened, merit-ranked candidates — faster, fairer hiring for everyone." />
    <meta name="keywords" content="job portal, jobs, find jobs, job search, online jobs, hiring platform, verified jobs, recruitment, hire talent, job vacancies, careers, employment, best job portal, Switchera" />
    <meta name="author" content="Switchera" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#2d79f2" />
    <link rel="canonical" href="https://switchera.in/" />

    <!-- PWA (installable app) -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Switchera" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://switchera.in/" />
    <meta property="og:site_name" content="Switchera" />
    <meta property="og:title" content="Switchera — Verified Job Portal | Find Jobs &amp; Hire Verified Talent" />
    <meta property="og:description" content="Find verified jobs and hire pre-screened, skill-assessed talent. Switchera makes hiring faster and fairer with credential verification and proctored assessments." />
    <meta property="og:image" content="https://switchera.in/logo.png" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Switchera — Verified Job Portal | Find Jobs &amp; Hire Verified Talent" />
    <meta name="twitter:description" content="Find verified jobs and hire pre-screened, skill-assessed talent on Switchera." />
    <meta name="twitter:image" content="https://switchera.in/logo.png" />

    <!-- Structured Data: Organization + WebSite with search action -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://switchera.in/#organization",
          "name": "Switchera",
          "url": "https://switchera.in/",
          "logo": "https://switchera.in/logo.png",
          "description": "Verified job portal connecting job seekers with trusted employers through credential verification and proctored skill assessments.",
          "sameAs": ["https://www.linkedin.com/company/switchera-in/"]
        },
        {
          "@type": "WebSite",
          "@id": "https://switchera.in/#website",
          "url": "https://switchera.in/",
          "name": "Switchera",
          "publisher": { "@id": "https://switchera.in/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": { "@type": "EntryPoint", "urlTemplate": "https://switchera.in/candidate/jobs?search={search_term_string}" },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker (enables install + offline)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {});
        });
      }
      // Count an app "download" once per device, across all platforms.
      function trackInstall() {
        try {
          if (localStorage.getItem('switchera_installed')) return;
          localStorage.setItem('switchera_installed', '1');
          fetch('/api/analytics/track', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ event_type: 'app_download', path: '/' })
          }).catch(function () {});
        } catch (e) {}
      }
      // Android / desktop Chrome: fires at install time
      window.addEventListener('appinstalled', trackInstall);
      // iPhone (and any platform): if opened as an installed app, count it once
      window.addEventListener('load', function () {
        var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        if (standalone) trackInstall();
      });
    </script>
  </body>
</html>
